name: Build CONTROL tipa

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install ldid
        run: |
          brew update
          brew install ldid

      - name: Build tipa
        run: |
          make clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CONTROL-tipa
          path: CONTROL.tipa
